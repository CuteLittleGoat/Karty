<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karty Second - Panel i Widok Użytkownika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <div class="header-intro">
          <p class="eyebrow">Drugi moduł</p>
          <h1>Aplikacja do liczenia Omeru od drugiej nocy Pesach do Szawuot</h1>
        </div>
        <div class="header-controls">
          <img class="header-icon" src="../Pliki/Ikona.png" alt="Ikona" />
          <div class="admin-toolbar">
            <button id="secondInstructionButton" class="secondary" type="button">Instrukcja</button>
            <span id="secondAdminPasswordBypassNote" class="admin-password-bypass-note">tymczasowo brak potrzeby wpisywania hasła admina</span>
          </div>
        </div>
      </header>

      <main id="appRoot" class="grid"></main>
    </div>

    <template id="adminViewTemplate">
      <section class="card admin-panel-card">
        <div class="card-header admin-panel-header">
          <h2>Panel Administratora</h2>
          <div class="admin-panel-refresh-controls">
            <button id="adminPanelRefresh" class="secondary" type="button">Odśwież</button>
            <span id="adminPanelRefreshStatus" class="status-text" aria-live="polite"></span>
          </div>
        </div>

        <div class="admin-panel-tabs" role="tablist" aria-label="Zakładki panelu administratora">
          <button class="admin-panel-tab is-active" type="button" data-target="adminNewsTab">Aktualności</button>
          <button class="admin-panel-tab" type="button" data-target="adminChatTab">Czat</button>
          <button class="admin-panel-tab" type="button" data-target="adminRulesTab">Regulamin</button>
          <button class="admin-panel-tab" type="button" data-target="adminNotesTab">Notatki</button>
          <button class="admin-panel-tab" type="button" data-target="adminTournamentTab">TOURNAMENT OF POKER</button>
        </div>

        <div id="adminNewsTab" class="admin-panel-content is-active" role="tabpanel">
          <div class="admin-message">
            <div>
              <h3>Wiadomość do graczy</h3>
              <p>Informacja jaka będzie w polu &gt;Najnowsze&lt;</p>
            </div>
            <div class="admin-message-form">
              <label for="adminMessageInput">Treść wiadomości</label>
              <textarea
                id="adminMessageInput"
                rows="25"
                placeholder="Np. Runda startuje za 10 minut — przejdźcie do stołów."
                data-focus-target="1"
                data-section="second-admin-news"
                data-column-key="message"
              ></textarea>
              <div class="admin-message-actions">
                <button id="adminMessageSend" class="primary" type="button">Wyślij</button>
                <span id="adminMessageStatus" class="status-text" aria-live="polite">Gotowe do wysłania wiadomości.</span>
              </div>
            </div>
          </div>
        </div>

        <div id="adminChatTab" class="admin-panel-content" role="tabpanel">
          <section class="admin-chat">
            <div class="card-header">
              <h3>Czat</h3>
              <p>Moderuj wiadomości i usuwaj wpisy starsze niż 30 dni.</p>
            </div>
            <div class="admin-chat-actions">
              <button id="adminChatCleanup" class="danger" type="button">Usuń starsze niż 30 dni</button>
              <span id="adminChatStatus" class="status-text" aria-live="polite">Ładowanie wiadomości czatu...</span>
            </div>
            <div id="adminChatList" class="admin-chat-list"></div>
          </section>
        </div>

        <div id="adminRulesTab" class="admin-panel-content" role="tabpanel">
          <div class="admin-rules">
            <div class="card-header">
              <h3>Regulamin</h3>
              <p>Wpisz zasady obowiązujące przy stole. Treść jest widoczna dla wszystkich użytkowników.</p>
            </div>
            <label for="adminRulesInput">Treść regulaminu</label>
            <textarea id="adminRulesInput" rows="50" placeholder="Np. 1. Wpisowe jest bezzwrotne..."></textarea>
            <div class="admin-rules-actions">
              <button id="adminRulesSave" class="primary" type="button">Zapisz</button>
              <span id="adminRulesStatus" class="status-text" aria-live="polite">Ładowanie regulaminu...</span>
            </div>
          </div>
        </div>

        <div id="adminNotesTab" class="admin-panel-content" role="tabpanel">
          <div class="admin-rules">
            <div class="card-header">
              <h3>Notatki</h3>
              <p>Notatki administracyjne modułu Second.</p>
            </div>
            <label for="adminNotesInput">Treść notatek</label>
            <textarea
              id="adminNotesInput"
              rows="50"
              placeholder="Wpisz notatkę administracyjną..."
              data-focus-target="1"
              data-section="second-admin-notes"
              data-column-key="text"
            ></textarea>
            <div class="admin-rules-actions">
              <button id="adminNotesSave" class="primary" type="button">Zapisz</button>
              <span id="adminNotesStatus" class="status-text" aria-live="polite"></span>
            </div>
          </div>
        </div>

        <div id="adminTournamentTab" class="admin-panel-content" role="tabpanel">
          <div class="admin-games-layout">
            <aside class="admin-games-sidebar">
              <div class="card-header admin-games-sidebar-header">
                <h3>Panel</h3>
              </div>
              <div class="admin-games-years-list player-zone-sections-list">
                <button class="admin-games-year-button is-active" type="button" data-tournament-target="players">Losowanie graczy</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="draw">Losowanie stołów</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="payments">Wpłaty</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="pool">Podział puli</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="group">Faza grupowa</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="semi">Półfinał</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="final">Finał</button>
                <button class="admin-games-year-button" type="button" data-tournament-target="payouts">Wypłaty</button>
              </div>
            </aside>
            <section class="admin-games-content">
              <div id="adminTournamentRoot" class="admin-games-section"></div>
            </section>
          </div>
        </div>
      </section>

      <section class="card user-preview-card next-game-card">
        <div id="userPreviewMount"></div>
      </section>
    </template>

    <template id="userViewTemplate">
      <section class="card user-card next-game-card">
        <div class="user-panel">
          <div class="user-tabs" role="tablist" aria-label="Zakładki użytkownika">
            <button class="tab-button is-active" type="button" data-target="updatesTab">Aktualności</button>
            <button class="tab-button" type="button" data-target="chatTab">Czat</button>
            <button class="tab-button" type="button" data-target="rulesTab">Regulamin</button>
            <button class="tab-button" type="button" data-target="tournamentTab">TOURNAMENT OF POKER</button>
          </div>
          <div class="user-panel-refresh-controls">
            <button id="userPanelRefresh" class="secondary" type="button">Odśwież</button>
            <span id="userPanelRefreshStatus" class="status-text" aria-live="polite"></span>
          </div>
        </div>
        <div class="user-tab-content">
          <div id="updatesTab" class="tab-panel is-active" role="tabpanel">
            <div class="card-header">
              <h2>Aktualności</h2>
            </div>
            <div class="latest-message">
              <label for="latestMessageOutput">Najnowsze</label>
              <textarea id="latestMessageOutput" rows="25" readonly placeholder="Brak wiadomości od administratora."></textarea>
              <p id="newsOutputStatus" class="status-text" aria-live="polite">Ładowanie aktualności...</p>
            </div>
          </div>

          <div id="chatTab" class="tab-panel" role="tabpanel">
            <div class="pin-gate" aria-live="polite">
              <div class="pin-card">
                <p class="pin-title">Wpisz PIN z uprawnieniem Czat, aby dołączyć do rozmowy.</p>
                <div class="pin-inputs">
                  <input id="chatPinInput" type="tel" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" minlength="5" placeholder="PIN (5 cyfr)" />
                  <button id="chatPinOpenButton" class="primary" type="button">Otwórz</button>
                </div>
                <p id="chatPinStatus" class="status-text"></p>
              </div>
            </div>
            <div class="chat-content">
              <div id="chatMessages" class="chat-messages">
                <p class="chat-empty">Brak wiadomości.</p>
              </div>
              <div class="chat-form">
                <label for="chatMessageInput">Twoja wiadomość</label>
                <textarea id="chatMessageInput" rows="3" maxlength="600" placeholder="Napisz wiadomość do graczy..."></textarea>
                <div class="chat-form-actions">
                  <button id="chatSendButton" class="primary" type="button">Wyślij</button>
                  <span id="chatStatus" class="status-text" aria-live="polite">Ładowanie czatu...</span>
                </div>
              </div>
            </div>
          </div>

          <div id="rulesTab" class="tab-panel" role="tabpanel">
            <div class="card-header">
              <h2>Regulamin</h2>
            </div>
            <div class="latest-message latest-rules">
              <label for="rulesOutput">Obowiązujące zasady</label>
              <textarea id="rulesOutput" rows="50" readonly placeholder="Administrator jeszcze nie dodał regulaminu."></textarea>
              <p id="rulesStatus" class="status-text" aria-live="polite">Ładowanie regulaminu...</p>
            </div>
          </div>

          <div id="tournamentTab" class="tab-panel" role="tabpanel">
            <div class="admin-games-layout">
              <aside class="admin-games-sidebar">
                <div class="card-header admin-games-sidebar-header">
                  <h3>Panel</h3>
                </div>
                <div class="admin-games-years-list player-zone-sections-list">
                  <button class="admin-games-year-button is-active" type="button" data-tournament-target="players">Losowanie graczy</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="draw">Losowanie stołów</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="payments">Wpłaty</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="pool">Podział puli</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="group">Faza grupowa</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="semi">Półfinał</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="final">Finał</button>
                  <button class="admin-games-year-button" type="button" data-tournament-target="payouts">Wypłaty</button>
                </div>
              </aside>
              <section class="admin-games-content">
                <div class="admin-games-section">
                  <p class="builder-info" data-tournament-text>Strona w budowie</p>
                </div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </template>


    <div id="secondInstructionModal" class="modal-overlay" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="secondInstructionTitle">
        <div class="modal-header">
          <h3 id="secondInstructionTitle">Instrukcja obsługi</h3>
          <button id="secondInstructionClose" class="icon-button" type="button" aria-label="Zamknij okno">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <p id="secondInstructionStatus" class="status-text">Instrukcja ładuje się automatycznie po otwarciu okna.</p>
          <div id="secondInstructionContent" class="modal-content" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div id="secondPlayerPermissionsModal" class="modal-overlay" aria-hidden="true">
      <div class="modal-card modal-card-sm" role="dialog" aria-modal="true" aria-labelledby="secondPlayerPermissionsTitle">
        <div class="modal-header">
          <h3 id="secondPlayerPermissionsTitle">Uprawnienia gracza</h3>
          <button id="secondPlayerPermissionsClose" class="icon-button" type="button" aria-label="Zamknij okno">
            ✕
          </button>
        </div>
        <div class="modal-body">
          <p class="status-text">Aktualnie dostępne są testowe uprawnienia do sprawdzenia działania listy.</p>
          <div id="secondPlayerPermissionsList" class="permissions-list"></div>
          <p id="secondPlayerPermissionsStatus" class="status-text" aria-live="polite"></p>
        </div>
      </div>
    </div>

    <script src="../config/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
